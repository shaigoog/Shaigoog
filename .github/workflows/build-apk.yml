name: Build Shaigoog Ledger APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct project archive
        shell: bash
        run: |
          cat artifacts/m0.b64.* | base64 --decode > /tmp/shaigoog-ledger-m0.zip
          echo "892ef0da68760932e0e574ba90b5e57d94b44dc5cc1fa83bac8d98d758025a77  /tmp/shaigoog-ledger-m0.zip" | sha256sum --check --strict
          mkdir -p project
          unzip -q /tmp/shaigoog-ledger-m0.zip -d project

      - name: Apply AGP 9 compatibility patch
        shell: python
        run: |
          from pathlib import Path
          path = Path("project/app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          obsolete = '''
    applicationVariants.all {
        outputs.all {
            (this as com.android.build.gradle.internal.api.BaseVariantOutputImpl).outputFileName =
                "Shaigoog_Ledger_${versionName}.apk"
        }
    }
'''
          if obsolete not in text:
              raise SystemExit("Expected obsolete APK naming block was not found")
          path.write_text(text.replace(obsolete, ""), encoding="utf-8")

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build debug APK
        working-directory: project
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: shaigoog-ledger-apk
          path: project/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
