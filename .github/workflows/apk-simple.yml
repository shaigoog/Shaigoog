name: Build APK

"on":
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore project
        run: |
          cat artifacts/m0.b64.* | base64 --decode > /tmp/project.zip
          echo "892ef0da68760932e0e574ba90b5e57d94b44dc5cc1fa83bac8d98d758025a77  /tmp/project.zip" | sha256sum -c -
          mkdir project
          unzip -q /tmp/project.zip -d project

      - name: Remove obsolete APK rename block
        run: sed -i '/    applicationVariants.all {/,/    }/d' project/app/build.gradle.kts

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build APK
        working-directory: project
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shaigoog-ledger-apk
          path: project/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
