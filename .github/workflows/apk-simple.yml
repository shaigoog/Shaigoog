name: Build APK

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore project
        run: |
          cat artifacts/m0.b64.* | base64 --decode > /tmp/project.zip
          echo "892ef0da68760932e0e574ba90b5e57d94b44dc5cc1fa83bac8d98d758025a77  /tmp/project.zip" | sha256sum -c -
          mkdir project
          unzip -q /tmp/project.zip -d project

      - name: Remove obsolete APK rename block
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("project/app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          pattern = r'\n    applicationVariants\.all \{\n.*?\n    \}\n(?=\})'
          updated, count = re.subn(pattern, '\n', text, flags=re.S)
          if count != 1:
              raise SystemExit(f"Expected one obsolete block, removed {count}")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build APK
        working-directory: project
        run: |
          set +e
          gradle :app:assembleDebug --console=plain --no-daemon > /tmp/build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E "FAILURE:|What went wrong|Build file|Could not|^e:|error:|Exception|Caused by" /tmp/build.log | tail -n 30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            tail -n 100 /tmp/build.log
            exit "$status"
          fi
          cat /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shaigoog-ledger-apk
          path: project/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
