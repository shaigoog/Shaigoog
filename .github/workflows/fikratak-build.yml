name: Build Fikratak Android

on:
  workflow_dispatch:
  push:
    branches:
      - feature/fikratak-app
  pull_request:
    paths:
      - 'fikratak-app/**'
      - '.github/workflows/fikratak-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source part 00
        run: echo "07eb5149a73a26c3631643d766ba185126abc1f7f00f6a53f8d647cff3f4a76a  fikratak-app/source-parts/part-00.b64" | sha256sum -c -

      - name: Validate source part 01
        run: echo "f5c34b23db693e9fe4c80924b44846198a1df9cde6a896c0c4af7d6cb2998a90  fikratak-app/source-parts/part-01.b64" | sha256sum -c -

      - name: Validate repaired source 02
        run: |
          echo "3959230d85469768a332893f4dc36026362ac4b58a48d077ba450a5366dc20d2  fikratak-app/source-parts/part-02s-00.b64" | sha256sum -c -
          echo "299a57f3f8066f71a3bcd3abec32b428713af4bfae42c0bf52779a29e8a7b80b  fikratak-app/source-parts/part-02s-01.b64" | sha256sum -c -
          echo "9b8ed82bd633c06a33eab60da09aa31782aa6621f21e6664d77bd0caa74b9507  fikratak-app/source-parts/part-02s-02.b64" | sha256sum -c -
          echo "86adaf22d228c4ed76f11c63f860790ddf5cada8064c5f8d72fe8dfc39b4755b  fikratak-app/source-parts/part-02s-03.b64" | sha256sum -c -
          echo "32600b3bd4dc60ca06c1c85eb4496a32d53960c3eaa127cb273e69c51cf917c0  fikratak-app/source-parts/part-02s-04.b64" | sha256sum -c -
          echo "fc54730788ae235c8d06c9bef67d33dc4721e36c14da787f9827b1aaa8d53c93  fikratak-app/source-parts/part-02s-05.b64" | sha256sum -c -
          echo "3c2c95372444f24d586d7dcd96b956ff54758d00a7a1a60a703772b6db58634a  fikratak-app/source-parts/part-02s-06.b64" | sha256sum -c -
          echo "e21cfdcf88c58767c772b6c4256032cd5ddaa1545a68078539416599d01e71e8  fikratak-app/source-parts/part-02s-07.b64" | sha256sum -c -
          echo "7f6ff5c69d0ea738a1e567564aebf4fe539b6c6238d213d160fc0e95bcab8493  fikratak-app/source-parts/part-02s-08.b64" | sha256sum -c -

      - name: Validate source part 03
        run: echo "898f09de34a0d2c58fdba53e1ebce977e364c70e3c6557ca8bf5a9365960563e  fikratak-app/source-parts/part-03.b64" | sha256sum -c -

      - name: Validate source part 04
        run: echo "47b9befa712c77f11a82b80d1e5a830909c5a09abb3e5928d1bfa35c0e1db146  fikratak-app/source-parts/part-04.b64" | sha256sum -c -

      - name: Combine source archive
        run: |
          cat fikratak-app/source-parts/part-00.b64 \
              fikratak-app/source-parts/part-01.b64 \
              fikratak-app/source-parts/part-02s-00.b64 \
              fikratak-app/source-parts/part-02s-01.b64 \
              fikratak-app/source-parts/part-02s-02.b64 \
              fikratak-app/source-parts/part-02s-03.b64 \
              fikratak-app/source-parts/part-02s-04.b64 \
              fikratak-app/source-parts/part-02s-05.b64 \
              fikratak-app/source-parts/part-02s-06.b64 \
              fikratak-app/source-parts/part-02s-07.b64 \
              fikratak-app/source-parts/part-02s-08.b64 \
              fikratak-app/source-parts/part-03.b64 \
              fikratak-app/source-parts/part-04.b64 > /tmp/fikratak-source.b64
          echo "d2cde71a918f055d2ec7095418134ca669ee73a91426fad4713d65a3944b2c82  /tmp/fikratak-source.b64" | sha256sum -c -

      - name: Decode source archive
        run: |
          base64 --decode /tmp/fikratak-source.b64 > /tmp/fikratak-source.zip
          echo "901e3a95fb6f542b8b0efc3b7dba32f604186102d82ef12f2aca4bcc400b1a83  /tmp/fikratak-source.zip" | sha256sum -c -

      - name: Extract and patch project source
        run: |
          mkdir -p /tmp/fikratak-build
          unzip -t /tmp/fikratak-source.zip
          unzip -q /tmp/fikratak-source.zip -d /tmp/fikratak-build
          sed -i '/import androidx.compose.foundation.layout.weight/d' /tmp/fikratak-build/fikratak-app/app/src/main/java/com/fikratak/app/MainActivity.kt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: /tmp/fikratak-build/fikratak-app
        run: gradle :app:assembleDebug --stacktrace

      - name: Build release AAB
        working-directory: /tmp/fikratak-build/fikratak-app
        run: gradle :app:bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fikratak-debug-apk
          path: /tmp/fikratak-build/fikratak-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: fikratak-release-aab-unsigned
          path: /tmp/fikratak-build/fikratak-app/app/build/outputs/bundle/release/app-release.aab

      - name: Upload source ZIP
        uses: actions/upload-artifact@v4
        with:
          name: fikratak-source
          path: /tmp/fikratak-source.zip
